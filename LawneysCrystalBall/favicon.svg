<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer border/shadow effect -->
  <rect width="32" height="32" rx="8" fill="#a78bfa" opacity="0.3" />
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#brandGrad)" stroke="#a78bfa" stroke-width="1" />
  
  <!-- "VP" letters -->
  <text x="16" y="23" text-anchor="middle" font-family="'MedievalSharp', cursive" font-weight="900" font-size="16" fill="#fbbf24" filter="url(#glow)">VP</text>
  
  <!-- Magical Sparkles -->
  <circle cx="25" cy="7" r="1.2" fill="white" filter="url(#glow)" />
  <circle cx="6" cy="25" r="0.8" fill="white" opacity="0.6" />
</svg>
